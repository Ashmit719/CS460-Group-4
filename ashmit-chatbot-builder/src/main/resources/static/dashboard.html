<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BotBuilder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-top">
                <a href="dashboard.html" class="brand">
                    <div class="brand-icon">🤖</div>
                    <span>BotBuilder</span>
                </a>

                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="sidebar-link active">My Bots</a>
                    <a href="create-bot.html?mode=create" class="sidebar-link">Create New Bot</a>
                    <a href="analytics.html" class="sidebar-link" id="analytics-link">Analytics</a>
                    <a href="settings.html" class="sidebar-link">Settings</a>
                </nav>
            </div>

            <div class="sidebar-bottom">
                <button id="logout-btn" class="sidebar-link logout-btn">Logout</button>
            </div>
        </aside>

        <main class="dashboard-main">
            <div class="dashboard-topbar">
                <div>
                    <h1>My Bots</h1>
                    <p>Manage and monitor your chatbots</p>
                </div>

                <a href="create-bot.html?mode=create" class="btn btn-primary">Create New Bot</a>
            </div>

            <div class="search-row">
                <input id="bot-search" type="text" placeholder="Search bots...">
            </div>

            <div id="bot-grid" class="bot-grid">
                <!-- Filled by dashboard.js -->
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
