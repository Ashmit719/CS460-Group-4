<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BotBuilder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="brand">
                    <div class="brand-icon">🤖</div>
                    <span>BotBuilder</span>
                </a>
                <h1>Welcome back</h1>
                <p>Log in, create an account, or reset your password.</p>
            </div>

            <div class="auth-grid">
                <div class="auth-block">
                    <h2>Log In</h2>

                    <input id="login-email" type="email" placeholder="Email">
                    <input id="login-password" type="password" placeholder="Password">

                    <div id="login-message" class="form-message"></div>

                    <button id="login-btn" class="btn btn-primary btn-full" type="button">Log In</button>
                </div>

                <div class="auth-block">
                    <h2>Create Account</h2>

                    <input id="signup-name" type="text" placeholder="Full name">
                    <input id="signup-email" type="email" placeholder="Email">
                    <input id="signup-password" type="password" placeholder="Password">
                    <input id="signup-confirm-password" type="password" placeholder="Confirm password">
                    <input id="signup-pin" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit PIN">
                    <input id="signup-admin-code" type="password" placeholder="Admin access code (optional)">

                    <div id="signup-message" class="form-message"></div>

                    <button id="signup-btn" class="btn btn-secondary btn-full" type="button">Create Account</button>
                </div>
            </div>

            <div class="auth-grid auth-reset-grid">
                <div class="auth-block auth-reset-block">
                    <h2>Forgot Password</h2>

                    <input id="reset-email" type="email" placeholder="Email">
                    <input id="reset-pin" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit PIN">
                    <input id="reset-new-password" type="password" placeholder="New password">

                    <div id="reset-message" class="form-message"></div>

                    <button id="reset-btn" class="btn btn-primary btn-full" type="button">Reset Password</button>
                </div>
            </div>

            <div class="auth-back">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
